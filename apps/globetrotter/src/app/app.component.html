@if (loading$ | async) {
  <ui-loader>
  </ui-loader>
}

@if (error$ | async) {
  <ui-error
    header="Server Error"
    message="Please check your connection and try reloading."
  ></ui-error>
}

@if (
  (loading$ | async) === false &&
  (error$ | async) === false
  ) {
  <router-outlet></router-outlet>
}
