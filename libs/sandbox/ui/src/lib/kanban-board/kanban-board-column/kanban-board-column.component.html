<div class="app-kbc__toolbar">
  <h2 class="name">
    {{ name }}
  </h2>
  @if (actions.length) {
  <fa-icon class="app-kbc__menu-icon" [icon]="menuIcon"></fa-icon>
  }
</div>
<ul
  class="app-kbc__list"
  cdkDropList
  [cdkDropListData]="items"
  (cdkDropListDropped)="onDropItem($event)"
>
  @for (item of items; track trackByFn($index, item)) {
  <li
    class="app-kbc__list-item"
    [class.list-item--moving]="moving"
    cdkDrag
    [cdkDragData]="{
      columnId: id,
      item: item
    }"
    (cdkDragStarted)="onDragItem()"
  >
    <ng-container
      [ngTemplateOutlet]="itemTemplate ? itemTemplate : defaultTemplate"
      [ngTemplateOutletContext]="{ $implicit: item }"
    ></ng-container>
  </li>
  }
</ul>
<app-kanban-board-form
  [name]="itemUnit"
  (add)="onItemAdd($event)"
></app-kanban-board-form>

<ng-template #defaultTemplate let-item>
  {{ getItemId(item) }}
</ng-template>
