<div class="container">
  <a class="dish-link" [routerLink]="['/dishes', id]">
    <h3 class="name">
      {{ name }}
    </h3>
  </a>
  <div class="details">
    @if (link) {
      <a [coreExternalLink]="link" class="external-link">
        <fa-icon [icon]="faLink"> </fa-icon>
      </a>
    }
    <ui-count class="count" type="days" [count]="usages"></ui-count>
    <ui-count class="count" type="menus" [count]="menuIds.length"></ui-count>
    <ui-count class="count" type="meals" [count]="mealIds.length"></ui-count>
  </div>
</div>

@if (description) {
  <p class="description">
    {{ description }}
  </p>
}

@if (tags.length) {
  <ui-tags-list class="tags" [tags]="tags">
    <ui-tag *uiTagDef="let tag" [id]="tag.id" [name]="tag.name"></ui-tag>
  </ui-tags-list>
}
