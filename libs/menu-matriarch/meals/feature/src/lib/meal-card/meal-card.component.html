<ui-card [active]="active">
  <div class="top">
    <a routerLink="/meals/{{ id }}">
      <h3 class="name">
        {{ name }}
      </h3>
    </a>
    @if (description) {
    <p class="description">
      {{ description }}
    </p>
    } @if (tags.length) {
    <ui-tags-list class="tags" [tags]="tags">
      <ui-tag *uiTagDef="let tag" [id]="tag.id" [name]="tag.name"></ui-tag>
    </ui-tags-list>
    }
  </div>
  <ui-meal-summary
    [dishes]="dishes"
    [fallbackText]="fallbackText"
    [orientation]="orientation"
  ></ui-meal-summary>
</ui-card>
