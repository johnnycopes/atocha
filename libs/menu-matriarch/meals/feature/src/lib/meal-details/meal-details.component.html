@if (vm$ | async; as vm) {
  @if (vm.meal; as meal) {
    <ui-section>
      <div class="ui-section__toolbar">
        <button core-button="danger" class="button" (click)="onDelete()">
          Delete
        </button>
        <a core-button="secondary" class="button" routerLink="edit"> Edit </a>
      </div>
      <div class="ui-section__content">
        <h2 class="name">
          {{ meal.name }}
        </h2>
        @if (meal.description) {
          <p class="description">
            {{ meal.description }}
          </p>
        }
        @if (meal.tags.length) {
          <ui-tags-list [tags]="meal.tags">
            <ui-tag *uiTagDef="let tag" [id]="tag.id" [name]="tag.name"></ui-tag>
          </ui-tags-list>
        }
        <div class="details">
          <ui-meal-summary
            [dishes]="meal.dishes"
            [fallbackText]="vm.fallbackText"
            [orientation]="vm.orientation"
            boundaries="labeled"
          ></ui-meal-summary>
        </div>
      </div>
    </ui-section>
  }
}
