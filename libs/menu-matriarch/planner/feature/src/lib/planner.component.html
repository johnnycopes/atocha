@if (menu$ | async; as menu) { @if (menu !== 'INVALID') { @if (view$ | async; as
view) { @if (view === 'dishes') {
<app-planner-dishes
  class="left"
  [menu]="menu"
  (nameDblClick)="updateView('meals')"
></app-planner-dishes>
} @if (view === 'meals') {
<app-planner-meals
  class="left"
  [menu]="menu"
  (nameDblClick)="updateView('dishes')"
></app-planner-meals>
} }
<app-planner-menu class="right" [menu]="menu"></app-planner-menu>
} @else {
<ui-empty-view-placeholder
  headerText="Invalid Menu"
  messageText="Please select a different menu to view the planner."
>
  <a core-button routerLink="/menus"> Go To Menus </a>
</ui-empty-view-placeholder>
} }
