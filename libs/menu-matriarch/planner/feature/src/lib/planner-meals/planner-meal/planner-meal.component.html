<ui-card>
  <div class="top">
    <a routerLink="/meals/{{ id }}">
      <h3 class="name">
        {{ name }}
      </h3>
    </a>
    @if (description) {
      <p class="description">
        {{ description }}
      </p>
    }
    @if (tags.length) {
      <ui-tags-list class="tags" [tags]="tags">
        <ui-tag *uiTagDef="let tag" [id]="tag.id" [name]="tag.name"></ui-tag>
      </ui-tags-list>
    }
  </div>
  <ui-meal-summary
    [dishes]="dishes"
    [fallbackText]="fallbackText"
    [orientation]="orientation"
  ></ui-meal-summary>
  @if (entryModels.length) {
    <div class="schedule">
      @for (model of entryModels; track trackByFn($index, model)) {
        <core-checkbox
          class="checkbox"
          [indeterminate]="model.indeterminate"
          [ngModel]="model.checked"
      (ngModelChange)="
        dayChange.emit({
          day: model.day,
          dishIds: model.dishIds,
          selected: $event
        })
      "
          >
          {{ model.day | slice : 0 : 3 }}
        </core-checkbox>
      }
    </div>
  }
</ui-card>
