<ui-card>
  @if (editing$ | async) {
    <ui-inline-name-edit
      class="form"
      [name]="name"
      (cancel)="finishEdit$.next()"
      (save)="onSave($event)"
    ></ui-inline-name-edit>
  } @else {
    <ui-tag [id]="id" [name]="name"></ui-tag>
    <div class="container">
      <ui-count class="count" type="meals" [count]="mealIds.length"></ui-count>
      <ui-count class="count" type="dishes" [count]="dishIds.length"></ui-count>
      <button core-button="danger" class="button" (click)="delete.emit()">
        Delete
      </button>
      <button core-button="secondary" class="button" (click)="startEdit$.next()">
        Edit
      </button>
    </div>
  }
</ui-card>
