@if (form) {
  <ng-container [formGroup]="form">
    <core-selection-tree
      ui-card-content
      [formControlName]="controlName"
      [getId]="getId"
      [getChildren]="getChildren"
      [root]="root"
      [template]="checkboxTemplate"
      (nodeClick)="nodeClick.emit($event)"
    ></core-selection-tree>
  </ng-container>
}

<ng-template
  #checkboxTemplate
  let-item
  let-level="level"
  let-checked="checked"
  let-indeterminate="indeterminate"
  let-onChange="onChange"
  >
  @if (level === 0) {
    <core-checkbox
      ui-card-header
      [indeterminate]="indeterminate"
      size="normal"
      [ngModel]="checked"
      (ngModelChange)="onChange(item)"
      >
      {{ item.display?.name ?? item.id }}
    </core-checkbox>
  }

  @if (level > 0) {
    <core-checkbox
      class="checkbox"
      [style.margin-left.px]="(level - 1) * 24"
      [indeterminate]="indeterminate"
      size="normal"
      [ngModel]="checked"
      (ngModelChange)="onChange(item)"
      >
      @if (item.display?.aspectOf) {
        <ui-aspect-emblem
          [name]="item.display.aspectOf"
        ></ui-aspect-emblem>
      }
      {{ item.display?.name ?? item.id }}
      @if (item.display?.difficulty) {
        <ui-difficulty-emblem
          [value]="item.display.difficulty"
        ></ui-difficulty-emblem>
      }
      @if (item.display?.expansion) {
        <ui-expansion-emblem
          [value]="item.display.expansion"
        ></ui-expansion-emblem>
      }
    </core-checkbox>
  }
</ng-template>
