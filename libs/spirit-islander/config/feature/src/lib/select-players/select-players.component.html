@if (form) {
  <ng-container [formGroup]="form">
    <select formControlName="players" class="select-planers">
      @for (player of players; track trackByFn($index, player)) {
        <option
          [ngValue]="player"
          >
          {{ player }}
        </option>
      }
    </select>
  </ng-container>
}
