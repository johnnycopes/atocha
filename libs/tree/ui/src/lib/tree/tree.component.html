<ng-container
  [ngTemplateOutlet]="template ? template : defaultTemplate"
  [ngTemplateOutletContext]="{
    $implicit: root,
    level: level
  }"
></ng-container>

@if (getChildren(root)?.length) {
  @for (child of getChildren(root); track trackByFn($index, child)) {
    <core-tree
      [root]="child"
      [template]="template ? template : defaultTemplate"
      [level]="level + 1"
      [getId]="getId"
      [getChildren]="getChildren"
    ></core-tree>
  }
}

<ng-template #defaultTemplate let-node>
  <span data-test="core-tree-default-node">
    {{ getId(node) }}
  </span>
</ng-template>
