<div class="quiz-cards" @stagger>
  @for (country of shuffledCountries; track trackByFn($index, country)) {
    <app-quiz-card
      @fadeIn
      [type]="type"
      [country]="country"
      [isCurrentCountry]="country === currentCountry"
      [canFlip]="canFlipCards"
      (flipped)="canFlipCards = !$event"
      (guessed)="guessed.emit($event)"
    ></app-quiz-card>
  }
</div>
