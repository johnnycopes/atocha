<ui-small-caps header="Type">
  <div class="container">
    <p>Front / back of cards:</p>
    <div class="options" [formGroup]="form">
      @for (option of options; track trackByFn($index, option)) {
        <div class="option">
          <input
            class="option__input"
            [id]="option.display"
            [value]="option.value"
            formControlName="type"
            type="radio"
            />
          <label class="option__label" [for]="option.display">
            {{ option.display }}
          </label>
        </div>
      }
    </div>
  </div>
</ui-small-caps>
